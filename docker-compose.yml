services:
  db:
    image: postgres:18-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql # for version 18+
      # - pg/var/lib/postgresql/data # for version under 18: 17, 16, 15 etc...
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER}" ]
      interval: 5s
      retries: 5
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME} # ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      APP_ENV: ${APP_ENV}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
